@if (visible()) {
  <button
    type="button"
    (click)="scrollTop()"
    class="back-to-top fixed z-[90] flex min-h-12 min-w-12 items-center justify-center rounded-full border border-white/15 bg-brand-charcoal/95 text-white shadow-lg backdrop-blur-md transition hover:border-brand-red/50 hover:bg-brand-red/20 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-brand-red md:hidden touch-manipulation"
    style="bottom: max(1rem, env(safe-area-inset-bottom)); right: max(1rem, env(safe-area-inset-right))"
    aria-label="Wróć na górę strony"
  >
    <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <path d="M12 19V5M5 12l7-7 7 7" stroke-linecap="round" stroke-linejoin="round" />
    </svg>
  </button>
}
