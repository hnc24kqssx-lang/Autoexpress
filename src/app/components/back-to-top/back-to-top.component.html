@if (visible()) {
  <button
    type="button"
    (click)="scrollTop()"
    class="back-to-top tap-feedback fixed z-[90] flex min-h-10 min-w-10 items-center justify-center rounded-full border border-white/12 bg-brand-charcoal/80 text-neutral-300 shadow-md backdrop-blur-md transition hover:border-white/22 hover:bg-white/6 hover:text-white focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-brand-red md:hidden touch-manipulation"
    style="bottom: max(1rem, env(safe-area-inset-bottom)); right: max(1rem, env(safe-area-inset-right))"
    aria-label="Wróć na górę strony"
  >
    <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <path d="M12 19V5M5 12l7-7 7 7" stroke-linecap="round" stroke-linejoin="round" />
    </svg>
  </button>
}
