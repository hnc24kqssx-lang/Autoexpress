@if (toast.state(); as t) {
  <div
    class="toast-wrap pointer-events-none fixed inset-x-0 top-0 z-[110] flex justify-center px-3 pt-[max(0.75rem,env(safe-area-inset-top))] sm:px-4"
    role="status"
    [attr.aria-live]="t.kind === 'error' ? 'assertive' : 'polite'"
  >
    <div
      class="pointer-events-auto flex w-full max-w-md items-start gap-3 rounded-xl border px-4 py-3 shadow-lg backdrop-blur-md sm:max-w-lg"
      [ngClass]="
        t.kind === 'success'
          ? 'border-emerald-500/40 bg-emerald-950/90'
          : 'border-red-500/50 bg-red-950/90'
      "
    >
      <span class="mt-0.5 shrink-0 text-lg" aria-hidden="true">
        @if (t.kind === 'success') {
          <span class="text-emerald-400">✓</span>
        } @else {
          <span class="text-red-400">!</span>
        }
      </span>
      <p class="min-w-0 flex-1 text-sm leading-snug text-white">{{ t.message }}</p>
      <button
        type="button"
        (click)="dismiss()"
        class="flex min-h-11 min-w-11 shrink-0 items-center justify-center rounded-lg text-lg font-medium leading-none text-white/70 transition-colors hover:bg-white/10 hover:text-white focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-white sm:min-h-9 sm:min-w-9 sm:text-sm"
        aria-label="Zamknij powiadomienie"
      >
        ×
      </button>
    </div>
  </div>
}
